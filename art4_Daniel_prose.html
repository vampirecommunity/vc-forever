        парень. Он был худой, высокий, его черные, как вороново крыло, волосы ниспадали на плечи, кожа была бледная, тонкая и буквально светилась в темном
        помещении, в глазах был огонек, и временами кукловоду казалось, что они мерцают красным. Глядя на танцующего парня у Сасори тяжелело внизу живота,
        кажется он бы многое отдал за одну ночь с этим дьявольски красивым парнем.
    </p>

    <p>

         Время близилось к полуночи, включили медляк, пары медленно кружились по залу. Сасори встал и направился через танцующую толпу к столу за соком, но тут
        погас свет. В руках огненоволосого оказалось чье-то тело, чужие руки обвили его талию и чьи-то горячие губы потянулись к его губам. Поцелуй, невыносимо
        долгий, то нежный и волшебный, то обжегающе страстный. Чей-то язык переплетался с его собственным, уходя все глубже в ротик кукловода. Толи прошло
        мгновение, то ли целый час, Сасори не знал, но тем неменее, когда свет вновь зажгли поцелуй прервался. Кукловод оглянулся по сторонам, некогда
        танцующие парочки продолжали обниматся, а рядом с ним стояло два парня глядящих в разные стороны, и словно не замечающих его. Это были голубоглазый
        блондин, и черноглазый брюнет. Первая мысль пришедшая в голову кукловода, была примерно такого содержания: «И с кем, из них двоих, я сейчас целовался?»
    </p>
    <p>
    </p>
    <p>

        <b>Часть вторая</b>
    </p>
    <p>
    </p>
    <p>

         После той вечеринки прошло довольно много времени. К удовольствию Сасори тот, дьявольски красивый, брюнет учился с ним на одном курсе. Как узнал
        кукловод, его звали Итачи. О поющем блондине красноволосый тоже кое-что разузнал, его звали Тсукури Дейдара, учился он на третьем курсе, был довольно
        общительным и популярным, вокруг него всегда вилось много девчонок. Сасори с ним не общался, да и с Итачи, как-то, тоже.
    </p>

    <p>
         Учеба протекала довольно интересно, особенно любил Сасори историю. И вот к его неудовольствию, в кабинет постучали, и вошла куратор, как обычно ей
        нужно было сообщить, что – то студентам…
    </p>
    <p>

         Как выяснилось, назревала поездка в горы, жить будут в палатках, поход на 3 дня. Сасори мысленно поморщился, ему совсем не улыбалось жит три дня в
        драных палатках, нормально не спать, не есть, никаких удобств. Кукловод вздохнул, пара закончилась, и он отправился домой.
    </p>

    <p>
    
         Проснувшись от трелей будильника, Акасунна вспомнил о предстоящей поездке и поплелся в ванную. Умылся, оделся и побежал  на автобус, не забыв взять с
        собой сумку  с необходимыми шмотками и прочей ерундой.
    </p>

    <p>
         Ехали пару часов в душном автобусе, многие успели вздремнуть, когда же группа добралась до лагеря, многие уже выспались, начали шуметь и активно
        веселиться.
    </p>

    <p>
         Выползли из автобуса, как муравьи из муравейника, собрались в кучку и начали  распределение Предположительно, в палатках должны были жить по трое, но
        Сасори, как обычно, выпал в исключение, с ним в палатке будет обитать лишь один человек, не считая самого кукловода. Кто это будет Сасори прослушал.
    </p>
    <p>

         Поев, вся группа отправилась в поход, весьма интересное, но бесполезное  занятие, а кукловод не любил тратить время попусту.
    </p>

    <p>

         К позднему вечеру они вернулись, перекусили, и разбрелись по палаткам. Сасори вошел в новое место своего обитания и лицезрел картину, которая ввела
        его в ступор на пару минут. Перед ним, спиной к кукловоду,  стоял полуголый  Итачи, натягивающий на себя длинную футболку. Сасори не дышал, а если и
        дышал,  то очень тихо, он наблюдал за черноволосым парнем. Учиха, не поворачивался, приподнял футболку и стянул с себя трусы, забросил их в спортивную
        сумку и одернул футболку. Кукловод уставился на изумительное тело Учихи и почувствовал как внутри него проснулось желание. Наконец-то почувствовав
        чье-то присутствие Итачи обернулся, и поняв что кукловод видел как он переодевается, залился краской.
    </p>
    <p>
    </p>
    <p>

        * * * * *
    </p>
    <p>
    </p>
    <p>

        Здравствуй Вэйю! Я пишу тебе это письмо, зная, что оно уже не воспроизведет такого эффекта, какой в былые времена приносили такие послания.… Хочу
        сказать… нет… написать, что тебя ждет, если ты не скроешься за семью печатями от моей любви…. Возможно… дикие мысли посещают мою голову, при одном,
        лишь упоминании тебя,… но к чему слова, сейчас я опишу тебе всю картину…. И так, давай представим, что это сон и посмотрим к чему он нас приведет…. В
        Аду, как ты возможно уже знаешь, есть Семь Кругов, да и еще Предсмертная Пустыня… я буду ждать тебя на последнем кольце, в алькове Люцифера….
    </p>
    <p>
    </p>
    <p>
        Ты закрываешь глаза, лежа в своей постели, поправляешь одеяло и… проваливаешься в сон… Пустота… это все, что способен уловить твой взгляд, но Она
        меняется…
    </p>
    <p>
    </p>
    <p>
        Ты удостоился великой чести, милый, разве это не прекрасно? Тебя встречают Левиафан и Бериал, проводником же тебе послужит сам Сатаниель, может ли кто
        получить привилегии выше этих?
    </p>
    <p>
    </p>
    <p>
        Издавна, на седьмом кругу Ада казнили предателей, первым из них был Иуда,… сейчас там святилище Люцифера… Он проводит тут свои пиры, на огромном столе
        подают изысканные блюда из сочного, нежного мяса грешников… сегодня, тут предстоит возлежать тебе…. Ты будешь моим экзотическим блюдом….
    </p>
    <p>
    </p>
    <p>
        Я сижу у ног Люцифера и робко поглядываю на его суровое лицо,… слышу скрип дверей, устремляю туда свой взор и вижу… тебя… среди трех коронованных
        принцев Ада. Твое прекрасное, практически обнаженное, тело сияет во тьме…
    </p>
    <p>
    </p>
    <p>
        Я вижу тебя… да, я тебя вижу, наслаждаюсь этим мгновением, впитывая в память каждую черточку твоего точеного лица…. Сатана заламывает твои руки и
        толкает тебя на стол….
    </p>
    <p>
    </p>
    <p>
        И вот, ты уже лежишь на серебряном подносе… не сопротивляешься… просто атмосфера в Аду на столько гнетущая, что по другому себя вести не возможно….
    </p>
    <p>
    </p>
    <p>
        Я встаю и подхожу к тебе, медленно, не уверенно… ближе… я рядом с тобой любимый…. Провожу холодными, дрожащими пальцами по твоему животу,… склоняюсь и
        вылизываю впадинку пупка, руки исследуют твое тело и… натыкаются на преграду, ткань… еще раз оцениваю тебя взглядом и вижу то, что мне мешает…. Твоя
        грудь утянута бинтами… улыбаюсь, все таки это так мило выглядит,… повозившись с минуту я освободил столь прекрасную часть тебя.
    </p>
    <p>
    </p>
    <p>
        Впиваюсь в нежные холмики голодным взглядом,… касаюсь твоих сосков пальцами, склоняюсь и целую розовые бусинки, посасывая и покусывая, оставляя
        багровые засосы…. Мну дрожащими руками твою грудь,… соскальзываю вниз, выстраивая дорожку из поцелуев к твоему лобку,… встречаю пару волосков,… целую,…
        тру пальцами твою щелку, проникая глубже и пачкаясь в твоих соках. Развожу тебе ножки и наслаждаюсь открывшейся мне картиной. Твои половые губки чуть
        припухли, и я приникаю к ним, целуя,… обхватываю их губами, посасываю, перекатываю во рту языком. Лижу вагину, буквально всасывая твою жидкость…
        сладкая… такой терпкий, необычный вкус… твой вкус, вкус феромонов, привкус любви… плотской, запретной,…не много развратной, но при одном лишь взгляде в
        твои глаза – невинной….
    </p>
    <p>
    </p>
    <p>
        Кладу голову к тебе на грудь, слушаю учащенное сердцебиение…
    </p>
    <p>
    </p>
    <p>
        Нет! Главное не останавливаться….
    </p>
    <p>
    </p>
    <p>
        Отстраняюсь. Беру, так заботливо уложенный рядом, скальпель… приставляю холодный металл к твоему вздрагивающему животу…. Смотрю, неспешно что-то решая
        для себя….
    </p>
    <p>
    </p>
    <p>
        Сердце сжимается.… Так сильно хочется, но не менее сильно больно, даже от мыслей о том, что я собираюсь сделать….
    </p>
    <p>
    </p>
    <p>
        Нажимаю на рукоять медицинского прибора и слышу тихий хруст лопающейся, под острым лезвием, кожи…. Скальпель преодолевает тонкую жировую прослойку и
        разрезает ткань розоватых волокон мяса….
    </p>
    <p>
    </p>
    <p>
        Больно! Тебе? Или мне? Обоим…. Сладко – голова кружиться…. Страшно – руки дрожат, но режут….
    </p>
    <p>
    </p>
    <p>
        Красная линия от груди до самого низа…. Любуюсь на тонкие струйки крови… алые, милые змейки….
    </p>
    <p>
    </p>
    <p>
        Прелесть моя….
    </p>
    <p>
    </p>
    <p>
        Теперь я смогу любить тебя еще больше, хотя лишь пару пределов назад думал, что большего я в себе просто не сумею вместить….
    </p>
    <p>
    </p>
    <p>
        Раздвигаю хрупкими пальцами эластичные стенки раны….
    </p>
    <p>
    </p>
    <p>
        Картина захватывающая и будоражащая воображение….
    </p>
    <p>
    </p>
    <p>
        Кости ребра и таза, сосуды, вены…. печень, желудок, кишки и почки…. А где то в клетке бьется сердце….
    </p>
    <p>
    </p>
    <p>
        Склониться, поцеловать,  снять языком слизь с оболочек…. Насладиться, но не насытиться…
    </p>
    <p>
    </p>
    <p>
        Решаю главный на сей момент вопрос, с чего же мне начать? Разглядываю тебя и ужасаюсь….
    </p>
    <p>
    </p>
    <p>
        Дороги назад больше нет! Я сделал то, чего страшился…. Больно….
    </p>
    <p>
    </p>
    <p>
        Но вспоминаю, что награда будет велика, что теперь ты со мною на вечно!
    </p>
    <p>
    </p>
    <p>
        Невольно вспоминаются строчки песни:
    </p>
    <p>
    </p>
    <p>
        «И мы должны быть с тобой!
    </p>
    <p>
    </p>
    <p>
        Одною мыслью, одной мечтой.
    </p>
    <p>
    </p>
    <p>
        Наши души сольются, и мы станем
    </p>
    <p>
    </p>
    <p>
        Красной Луной!»
    </p>
    <p>
    </p>
    <p>
ный мой мотив отражен в первой строке, золотце…. Я хочу, что бы ты был максимально близко… внутри меня…. Вопрос решился сам собой. Желая, что бы ты
        ощутил мою любовь, я вонзаюсь зубами в край раны….
    </p>
    <p>
    </p>
    <p>

        Боль, физическая или духовная – самое мощное, сильное чувство… такое же, как моя любовь к тебе…. Решаю совершить «Акт Милосердия» и избавить тебя от
        горечи моих чувств….
    </p>
    <p>
    </p>
    <p>

        Маленькая, хирургическая электронная пила…. Твои ребра крошатся под твердым, ребристым лезвием…. Сердце… я вижу его… вынимаю из кокона… обрываю
        капилляры связующие тебя с жизнью….
    </p>
    <p>
    </p>
    <p>
        Почему-то этот орган я съесть не в состоянии… ничего, милый, я его сберегу в формалине…. Я буду помнить тебя целую вечность, а когда она закончится,
        схороню себя рядом с тобою…
    </p>
    <p>
    </p>
    <p>

        <b>Сестра милосердия</b>
    </p>
    <p>
    </p>
    <p>

        Том ехал в Пятигорск, сидя в высоком кресле большого автобуса. Его мысли блуждали где-то далеко. Он смотрел на дорогу, и сердце так щемило, хотелось
        чего-то необычного, неправильного: любви, сражений, приключений. Его одолевала нескончаемая жажда, да еще, как на зло, Томми был кошмарно голоден.  В
        висках голод отдавался болью, вообще странно все это, но все моральное и физическое состояние Тома зависело от степени его сытости. Интересно как, с
        его то волчьим аппетитом и количеством поедаемой по ночам еды, Том умудрялся оставаться худым как щепка. Парень взглянул на подвешенное в автобусе
        зеркало и уловил свое отражение. За неимением лучшего оставалось фапать на свой светлый образ, к тому же новая прическа как не к стати отлично шла ему.
        «Ну чем я не парень, а? Хах, красавчик!»- думал Том, разглядывая французские косички. Маман определенно надеялась сделать из него такой прической
        нормальную девушку, но у нее снова ничего не вышло, Том только еще больше стал походить на парня, теперь чтоб отличить в нем девчушку требовалось
        приложить не мало усилий, впрочем и без того маленькую грудь стоило бы утянуть, тогда парень будет уж совсем не отразим. Автобус уже заехал в Пятигорск
        и Томми вернулся к созерцанию дороги. Что-то внутри него изменилось, и сердце снова стало щемить. Нет, он не был патриотом, так что дело совсем не в
        том, что он родился в этом городе, все было куда сложнее. Его мучило какое-то воспоминание, до боли родное и таинственное, но он упорно не мог ничего
        вспомнить. Память Тома можно было сравнить с каталогом какой-нибудь новомодной косметики. Стоит вам потереть страничку, и вы уже ощущаете на своих
        руках аромат дорогих духов, аналогично этому лента памяти парня представляла собой набор цветов, при внимательном рассмотрении дававших тонкий запах
        эмоций. Но подобно тому, что по запаху духов не всегда можно определить их название, по эмоциям Тома не всегда выстраивалась хронологическая
        последовательность вспоминаемых событий. Автобус остановился и, взяв тяжелые сумки, Томас вышел из него. Кучка таксистов уже ждала своих пассажиров,
        вручив водителю ношу Том забрался в салон машины. Таксист оказался на редкость неразговорчивым, так что вся поездка прошла в тишине, он помог парню
        донести багаж до съемной квартиры  и убрался восвояси. Том позвонил в дверь, хозяйка квартиры куда-то спешила и, вручив Томасу ключи выбежала вон.
    </p>
    <p>
    </p>
    <p>

        Разобрав вещи, парень перекусил и устроился у окна с книжкой в руках. Какое-то время он действительно читал, но вот его глаза оторвались от созерцания
        страниц, и взгляд уплыл в окно, мерно блуждая по деревьям и дорожкам парка. Внимание его привлек ярко-красный взрыв, некий крик против серого окружения
        обыденности. На скамейке парка сидела девушка, чей хаер и завлек Томаса. Дива была вся в черном и, в довершение картины, на ней красовался медицинский
        халат и белая шапочка, которые носят медсестры в частных клиниках. «Гатишно, черт возьми! Ну очень гатишно.»- подумал парень разглядывая сие чудо. Еще
        с минуту попялившись в окно, он таки не удержался и ринул вниз. Нет, Том не сиганул с окна, он выбежал в прихожую, обулся и поскакал на улицу. Забежав
        в парк, парень придал своему лицу серьезный, и даже немного скучающий, вид, словно это не он так торопился сюда вниз, а кто-то другой. Готического вида
        девушка продолжала гордо восседать на скамье, а Том лихорадочно думал, как бы с ней познакомиться. Копошась в своих мыслях он и не заметил, что девушка
