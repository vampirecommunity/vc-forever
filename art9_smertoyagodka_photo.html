<script type="text/javascript">
document.onkeydown = keyHit;
var thisPic = 0;

function keyHit(evt) {
var myPix = new Array("photos/smertoyagodka_art_p1.jpg","photos/smertoyagodka_art_p2.jpg","photos/smertoyagodka_art_p3.jpg","photos/smertoyagodka_art_p4.jpg","photos/smertoyagodka_art_p5.jpg","photos/smertoyagodka_art_p6.jpg","photos/smertoyagodka_art_p7.jpg");
var imgCt = myPix.length-1;
var ltArrow = 37;
var rtArrow = 39;

var thisKey = (evt) ? evt.which : window.event.keyCode;

if (thisKey == ltArrow) {
chgSlide(-1);
}
else if (thisKey == rtArrow) {
chgSlide(1);
}
return false;

function chgSlide(direction) {
thisPic = thisPic + direction;
if (thisPic > imgCt) {
thisPic = 0;
}
if (thisPic < 0) {
thisPic = imgCt;
}
document.getElementById("myPicture").src = myPix[thisPic];
}
}

</script>
